name: Deploy — production

# Manual trigger only. Push-to-main runs CI; merging to main does NOT auto-deploy.
# To deploy: GitHub → Actions tab → "Deploy — production" → Run workflow.
# This is our manual gate (GitHub Free plan doesn't support required-reviewers
# environment protections on private repos).
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY" to confirm production deploy'
        required: true
        default: ''
      skip_renderer:
        description: 'Skip the pdf-renderer Cloud Run deploy (only when nothing renderer-related changed)'
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.30.2'
  FIREBASE_PROJECT: peer-evaluator-rubric
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  deploy:
    name: Hosting + Functions + Firestore + Storage (prod)
    runs-on: ubuntu-latest
    environment: prod
    if: ${{ github.event.inputs.confirm == 'DEPLOY' }}
    steps:
      - name: Refuse if confirmation token is wrong
        if: ${{ github.event.inputs.confirm != 'DEPLOY' }}
        run: |
          echo "Confirmation token did not match. Aborting."
          exit 1

      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ops/shared build

      - name: Build web (with prod env)
        run: pnpm --filter @ops/web build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GOOGLE_OAUTH_CLIENT_ID: '968674433533-3k4qphmnaphhk5f4def24917vn24n0ha.apps.googleusercontent.com'
          VITE_USE_EMULATORS: 'false'

      - name: Build functions
        run: pnpm --filter @ops/functions build

      - name: Install functions production deps
        working-directory: apps/functions/lib
        run: npm install --production --ignore-scripts

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Auth to Firebase
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy hosting + functions + firestore rules + storage rules
        run: firebase deploy --project ${{ env.FIREBASE_PROJECT }} --only hosting,functions,firestore,storage --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}

  # The pdf-renderer Cloud Run service shares a payload contract with the
  # finalizeObservation function, so it must ship with the functions by
  # default. Skip only via the skip_renderer input when a deploy touches
  # nothing renderer-related. Requires the FIREBASE_SERVICE_ACCOUNT to hold
  # roles/cloudbuild.builds.editor, roles/run.admin, and
  # roles/iam.serviceAccountUser on the project.
  deploy-pdf-renderer:
    name: pdf-renderer (Cloud Run)
    runs-on: ubuntu-latest
    environment: prod
    if: ${{ github.event.inputs.confirm == 'DEPLOY' && github.event.inputs.skip_renderer != 'true' }}
    steps:
      - uses: actions/checkout@v5

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.FIREBASE_PROJECT }}

      - name: Build and push image (Cloud Build)
        run: |
          gcloud builds submit \
            --config apps/pdf-renderer/cloudbuild.yaml \
            --substitutions=_TAG=${{ github.sha }} \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pdf-renderer \
            --image us-central1-docker.pkg.dev/${{ env.FIREBASE_PROJECT }}/cloud-run-source-deploy/pdf-renderer:${{ github.sha }} \
            --region us-central1 \
            --no-allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --concurrency 4 \
            --timeout 120 \
            --set-env-vars NODE_ENV=production
