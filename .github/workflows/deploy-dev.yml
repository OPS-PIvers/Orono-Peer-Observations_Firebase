name: Deploy — dev preview

on:
  push:
    branches: [dev-paul]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.30.2'
  FIREBASE_PROJECT: peer-evaluator-rubric
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  deploy-preview:
    name: Hosting preview channel (dev-paul)
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @ops/shared build

      - name: Build functions
        run: pnpm --filter @ops/functions build

      - name: Install functions production deps
        # tsup writes lib/package.json during the build above. Running npm
        # install here gives the Firebase CLI a lib/node_modules it can
        # resolve firebase-functions from before uploading to Cloud Build.
        working-directory: apps/functions/lib
        run: npm install --production --ignore-scripts

      - name: Build web (with prod env)
        run: pnpm --filter @ops/web build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_USE_EMULATORS: 'false'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Auth to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy functions
        run: firebase deploy --project ${{ env.FIREBASE_PROJECT }} --only functions --non-interactive

      - name: Deploy to dev-paul preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.FIREBASE_PROJECT }}
          channelId: dev-paul
          expires: 30d
